services:
  db:
    image: postgres:16-alpine
    container_name: admon_db
    environment:
      POSTGRES_DB: ad_monitoring
      POSTGRES_USER: admon
      POSTGRES_PASSWORD: "AdMon_12345!"
    ports:
      - "5432:5432"
    volumes:
      - admon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admon -d ad_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: admon_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: admon_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"   # optional; keep if you want to open /docs directly
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: admon_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  admon_pgdata: